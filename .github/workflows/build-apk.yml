name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-size: 'large'
          node-version: 22
          cache: 'npm'

      - name: Install Node Dependencies
        run: npm ci || npm install

      - name: Build Web Application
        run: npm run build
        env:
          NODE_ENV: production
          VITE_API_URL: ${{ secrets.VITE_API_URL || 'https://ais-pre-qbyy2na74rv3l2g37lryrb-559951806594.us-east1.run.app' }}

      - name: Set up Java JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Initialize and Sync Capacitor Android
        run: |
          # If android folder doesn't exist, create it
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          # Copy the built web assets to Android platform and sync plugins
          npx cap sync android

      - name: Set Gradlew Executable Permission
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: uba-papua-app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14
